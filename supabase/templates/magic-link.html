<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to Tenantly</title>
</head>
<body style="margin: 0; padding: 0; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #ffffff;">
    <tr>
      <td align="center" style="padding: 0;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width: 480px; margin: 0 auto;">

          <!-- Spacer -->
          <tr><td style="height: 56px;"></td></tr>

          <!-- Logo -->
          <tr>
            <td style="padding: 0 24px; text-align: center;">
              <div style="display: inline-block; width: 52px; height: 52px; background-color: #1d1d1f; border-radius: 14px; line-height: 52px; text-align: center;">
                <span style="color: #ffffff; font-size: 22px; font-weight: 700;">T</span>
              </div>
            </td>
          </tr>

          <tr><td style="height: 36px;"></td></tr>

          <!-- Heading -->
          <tr>
            <td style="padding: 0 24px; text-align: center;">
              <h1 style="margin: 0; font-size: 26px; font-weight: 700; color: #1d1d1f; letter-spacing: -0.02em; line-height: 1.2;">Sign in to<br>Tenantly</h1>
            </td>
          </tr>

          <tr><td style="height: 16px;"></td></tr>

          <!-- Subtitle -->
          <tr>
            <td style="padding: 0 40px; text-align: center;">
              <p style="margin: 0; font-size: 16px; color: #86868b; line-height: 1.5;">Tap the button below to securely sign in. This link will expire in 1 hour.</p>
            </td>
          </tr>

          <tr><td style="height: 36px;"></td></tr>

          <!-- CTA Button -->
          <tr>
            <td style="padding: 0 24px; text-align: center;">
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 0 auto;">
                <tr>
                  <td style="border-radius: 12px; background-color: #1d1d1f;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display: inline-block; padding: 16px 40px; font-size: 16px; font-weight: 600; color: #ffffff; text-decoration: none; letter-spacing: -0.01em;">Sign In</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr><td style="height: 40px;"></td></tr>

          <!-- Divider -->
          <tr>
            <td style="padding: 0 24px;">
              <div style="height: 1px; background-color: #e8e8ed;"></div>
            </td>
          </tr>

          <tr><td style="height: 28px;"></td></tr>

          <!-- Fallback URL -->
          <tr>
            <td style="padding: 0 24px; text-align: center;">
              <p style="margin: 0; font-size: 13px; color: #86868b; line-height: 1.6;">
                If the button doesn&rsquo;t work, copy and paste this link into your browser:
              </p>
              <p style="margin: 8px 0 0; font-size: 12px; color: #0071e3; line-height: 1.6; word-break: break-all;">
                {{ .ConfirmationURL }}
              </p>
            </td>
          </tr>

          <tr><td style="height: 40px;"></td></tr>

          <!-- Footer -->
          <tr>
            <td style="padding: 0 24px; text-align: center;">
              <p style="margin: 0; font-size: 12px; color: #aeaeb2; line-height: 1.6;">
                If you didn&rsquo;t request this email, you can safely ignore it.
              </p>
            </td>
          </tr>

          <tr><td style="height: 48px;"></td></tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
